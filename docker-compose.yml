services:
  storyplay:
    image: ghcr.io/wdiandian/storyplay:latest
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    volumes:
      - storyplay_data:/app/.storyplay
      - storyplay_assets:/app/public/studio-assets
    restart: unless-stopped

volumes:
  storyplay_data:
  storyplay_assets:
